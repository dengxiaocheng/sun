name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.workflow }}-${{ github.ref_name }}"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure GitHub Pages source is configured
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          set -euo pipefail

          create_payload='{"source":{"branch":"main","path":"/"}}'
          api_url="https://api.github.com/repos/${{ github.repository }}/pages"
          echo "Preparing GitHub Pages source to branch=main path=/ ..."

          if curl -sSf -o /tmp/pages-current.json -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "$api_url" >/dev/null 2>&1; then
            echo "Pages configuration exists; attempting to sync branch/path."
            if ! curl -sSf -X PATCH "$api_url" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -d "$create_payload" >/tmp/pages-ensure.json; then
              echo "Skipping Pages API update: runner token cannot write Pages settings."
            fi
          else
            echo "Pages endpoint not readable; attempting first-time Pages setup."
            if ! curl -sSf -X POST "$api_url" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -d "$create_payload" >/tmp/pages-ensure.json; then
              echo "Skipping Pages API creation: runner token cannot write Pages settings."
            fi
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
